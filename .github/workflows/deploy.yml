name: Deploy reutilizable al VPS

# Robot de deploy compartido por TODAS las apps de Maze Funnels.
# Avisa al recepcionista del VPS (deploy.mazefunnels.io) por HTTPS.
# El VPS hace git fetch + reset + docker compose. No usa SSH entrante
# (Hostinger bloquea las IPs de GitHub en SSH; la puerta web sí pasa).

on:
  workflow_call:
    inputs:
      app_dir:
        description: "Carpeta de la app en el VPS (ej: /docker/maze-growth-simulator)"
        required: true
        type: string
      branch:
        description: "Rama a desplegar (ej: main o develop)"
        required: true
        type: string
      compose_file:
        description: "Archivo compose a usar"
        required: false
        type: string
        default: "docker-compose.yml"
      force_recreate:
        description: "Recrear todos los contenedores (poner false en apps con DB para no recrear postgres)"
        required: false
        type: boolean
        default: true
    secrets:
      DEPLOY_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Avisar al recepcionista del VPS
        run: |
          set -e
          code=$(curl -s -o /tmp/resp -w "%{http_code}" --max-time 600 \
            -X POST https://deploy.mazefunnels.io/deploy \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"app_dir\":\"${{ inputs.app_dir }}\",\"branch\":\"${{ inputs.branch }}\",\"compose_file\":\"${{ inputs.compose_file }}\",\"force_recreate\":${{ inputs.force_recreate }}}")
          echo "Respuesta HTTP: $code"
          echo "----- salida del deploy -----"
          cat /tmp/resp
          echo "-----------------------------"
          test "$code" = "200"
